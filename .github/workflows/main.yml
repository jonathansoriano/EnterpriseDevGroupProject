# Dharmin Patel
name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a new release build from the Actions tab'
        required: false
        default: false
        type: boolean

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default – each job declares only what it needs
permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # NOTE: GitHub Container Registry requires lowercase image names
  IMAGE_NAME_LOWER: ${{ github.repository_owner }}/enterprisedevgroupproject

jobs:

  # ────────────────────────────────────────────────
  # Job 1: Build, Test & Coverage
  # ────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build & Test with JaCoCo Coverage
        run: ./mvnw verify

      - name: Generate build summary
        if: always()
        run: |
          echo "## 🏗️ Build & Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f target/site/jacoco/index.html ]; then
            COVERAGE=$(grep -oP 'Total.*?(\d+%)' target/site/jacoco/index.html | grep -oP '\d+%' | head -1 || echo "N/A")
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Coverage** | ${COVERAGE} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **JDK** | 21 (Temurin) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Build Tool** | Maven |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ JaCoCo report not found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

  # ────────────────────────────────────────────────
  # Job 2: Enforce Test Requirement for Merging
  # ────────────────────────────────────────────────
  test-gate:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions: {}
    if: always()
    steps:
      - name: Check if build-and-test passed
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "❌ Tests failed! Merge to main is blocked until tests pass."
            exit 1
          fi
          echo "✅ All tests passed! Merge is allowed."

  # ────────────────────────────────────────────────
  # Job 3: Build, Push Docker Image & Scan with Trivy
  # ────────────────────────────────────────────────
  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: [build-and-test, test-gate]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.short-sha.outputs.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and Push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}@${{ steps.push.outputs.digest }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scan-type: image
          scanners: vuln

      - name: Trivy SARIF Scan (upload to Security tab)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
          scan-type: image
          scanners: vuln

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json
          retention-days: 90

      - name: Generate Docker build summary
        run: |
          echo "## 🐳 Docker Build & Security Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ steps.short-sha.outputs.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Trivy Scan** | CRITICAL,HIGH severity |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **SBOM** | CycloneDX (attached as artifact) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Attestation** | SLSA provenance pushed to registry |" >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────
  # Job 4: Publish – Full self-contained deployment bundle
  # ────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download SBOM from build
        uses: actions/download-artifact@v8
        with:
          name: sbom-cyclonedx

      # ── 1. Generate unique random credentials for this build ────────────
      - name: Generate random credentials
        id: creds
        run: |
          DB_USER="dbuser_$(openssl rand -hex 4)"
          DB_PASS="$(openssl rand -base64 24 | tr -d '/+=' | head -c 24)"
          DB_NAME="studentdir_$(openssl rand -hex 3)"
          GF_USER="admin_$(openssl rand -hex 3)"
          GF_PASS="$(openssl rand -base64 24 | tr -d '/+=' | head -c 24)"

          echo "db_user=${DB_USER}"       >> "$GITHUB_OUTPUT"
          echo "db_pass=${DB_PASS}"       >> "$GITHUB_OUTPUT"
          echo "db_name=${DB_NAME}"       >> "$GITHUB_OUTPUT"
          echo "gf_user=${GF_USER}"       >> "$GITHUB_OUTPUT"
          echo "gf_pass=${GF_PASS}"       >> "$GITHUB_OUTPUT"

          echo "✅ Unique credentials generated for this build"

      # ── 2. docker-compose.prod.yml (fully self-contained) ───────────────
      - name: Generate docker-compose.prod.yml
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ needs.docker-build-scan-push.outputs.image-tag }}"
          DB_USER="${{ steps.creds.outputs.db_user }}"
          DB_PASS="${{ steps.creds.outputs.db_pass }}"
          DB_NAME="${{ steps.creds.outputs.db_name }}"
          GF_USER="${{ steps.creds.outputs.gf_user }}"
          GF_PASS="${{ steps.creds.outputs.gf_pass }}"

          cat > docker-compose.prod.yml <<EOF
          # ═══════════════════════════════════════════════════════════════
          # Self-contained deployment – no .env file required
          # Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # To customise credentials, edit the values below directly.
          # ═══════════════════════════════════════════════════════════════
          services:

            db:
              image: postgres:17-alpine
              container_name: enterprise-db
              environment:
                POSTGRES_USER: ${DB_USER}
                POSTGRES_PASSWORD: ${DB_PASS}
                POSTGRES_DB: ${DB_NAME}
              volumes:
                - pgdata:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
                interval: 10s
                timeout: 5s
                retries: 5
              restart: unless-stopped
              networks:
                - backend

            app:
              image: ${IMAGE}
              container_name: enterprisedevgroupproject
              pull_policy: always
              ports:
                - "8080:8080"
              environment:
                JAVA_OPTS: "-Xms256m -Xmx512m"
                SPRING_PROFILES_ACTIVE: "prod"
                DATABASE_HOST: db
                DATABASE_PORT: "5432"
                DATABASE_USERNAME: ${DB_USER}
                DATABASE_PASSWORD: ${DB_PASS}
                PROD_DATABASE_NAME: ${DB_NAME}
                MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
                MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
              depends_on:
                db:
                  condition: service_healthy
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
                interval: 30s
                timeout: 5s
                retries: 3
                start_period: 40s
              networks:
                - backend
                - monitoring

            prometheus:
              image: prom/prometheus:v3.11.0
              container_name: enterprise-prometheus
              ports:
                - "9090:9090"
              volumes:
                - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
                - prometheus_data:/prometheus
              command:
                - '--config.file=/etc/prometheus/prometheus.yml'
                - '--storage.tsdb.path=/prometheus'
                - '--web.enable-lifecycle'
              depends_on:
                app:
                  condition: service_healthy
              restart: unless-stopped
              networks:
                - monitoring

            grafana:
              image: grafana/grafana:12.4.2
              container_name: enterprise-grafana
              ports:
                - "3000:3000"
              environment:
                GF_SECURITY_ADMIN_USER: ${GF_USER}
                GF_SECURITY_ADMIN_PASSWORD: ${GF_PASS}
                GF_USERS_ALLOW_SIGN_UP: "false"
              volumes:
                - grafana_data:/var/lib/grafana
                - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
              depends_on:
                - prometheus
              restart: unless-stopped
              networks:
                - monitoring

          volumes:
            pgdata:
            prometheus_data:
            grafana_data:

          networks:
            backend:
              driver: bridge
            monitoring:
              driver: bridge
          EOF

      # ── 3. monitoring/prometheus.yml ────────────────────────────────────────
      - name: Generate prometheus.yml
        run: |
          mkdir -p monitoring
          cat > monitoring/prometheus.yml <<'EOF'
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          rule_files:
            - "alerts.yml"

          scrape_configs:
            - job_name: 'student-directory-app'
              metrics_path: '/actuator/prometheus'
              static_configs:
                - targets: ['app:8080']
              relabel_configs:
                - source_labels: [__address__]
                  target_label: instance
                  replacement: 'student-directory'
          EOF

      # ── 4. monitoring/alerts.yml ──────────────────────────────────────────
      - name: Generate alerts.yml
        run: |
          cat > monitoring/alerts.yml <<'EOF'
          groups:
            - name: spring-boot-alerts
              rules:
                - alert: AppDown
                  expr: up{job="student-directory-app"} == 0
                  for: 1m
                  labels:
                    severity: critical
                  annotations:
                    summary: "Student Directory app is DOWN"
                    description: "The app has been unreachable for more than 1 minute."

                - alert: HighMemoryUsage
                  expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
                  for: 2m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High JVM heap usage"
                    description: "Heap usage is above 85% for 2 minutes."

                - alert: HighErrorRate
                  expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
                  for: 2m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High HTTP 5xx error rate"
                    description: "More than 10% of requests are returning 5xx errors."

                - alert: SlowResponseTime
                  expr: http_server_requests_seconds{quantile="0.95"} > 2
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "Slow response times (p95 > 2s)"
                    description: "95th percentile response time exceeded 2 seconds."
          EOF

      # ── 5. Grafana datasource provisioning ─────────────────────────────────
      - name: Generate Grafana datasource
        run: |
          mkdir -p monitoring/grafana/provisioning/datasources
          cat > monitoring/grafana/provisioning/datasources/prometheus.yml <<'EOF'
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://prometheus:9090
              isDefault: true
              access: proxy
              editable: false
              jsonData:
                timeInterval: "15s"
          EOF

      # ── 6. Grafana dashboard provisioning config ──────────────────────────
      - name: Generate Grafana dashboard provisioner
        run: |
          mkdir -p monitoring/grafana/provisioning/dashboards
          cat > monitoring/grafana/provisioning/dashboards/dashboards.yml <<'EOF'
          apiVersion: 1
          providers:
            - name: 'Student Directory Dashboards'
              orgId: 1
              type: file
              disableDeletion: false
              updateIntervalSeconds: 30
              options:
                path: /etc/grafana/provisioning/dashboards
          EOF

      # ── 7. Grafana Spring Boot JVM dashboard (ID 19004) ──────────────────
      - name: Download Grafana Spring Boot dashboard
        run: |
          curl -sL "https://grafana.com/api/dashboards/19004/revisions/latest/download" \
            -o monitoring/grafana/provisioning/dashboards/spring-boot-jvm.json
          echo "Dashboard downloaded: $(wc -c < monitoring/grafana/provisioning/dashboards/spring-boot-jvm.json) bytes"

      # ── 8. CREDENTIALS.txt (so users know what was generated) ───────────
      - name: Generate CREDENTIALS.txt
        run: |
          cat > CREDENTIALS.txt <<EOF
          ╔═══════════════════════════════════════════════════════════╗
          ║         DEPLOYMENT CREDENTIALS – KEEP SECURE             ║
          ╠═══════════════════════════════════════════════════════════╣
          ║                                                           ║
          ║  Database                                                 ║
          ║  ────────                                                 ║
          ║  Username : ${{ steps.creds.outputs.db_user }}
          ║  Password : ${{ steps.creds.outputs.db_pass }}
          ║  Database : ${{ steps.creds.outputs.db_name }}
          ║                                                           ║
          ║  Grafana                                                  ║
          ║  ───────                                                  ║
          ║  Username : ${{ steps.creds.outputs.gf_user }}
          ║  Password : ${{ steps.creds.outputs.gf_pass }}
          ║                                                           ║
          ║  Spring Boot                                              ║
          ║  ───────────                                              ║
          ║  Profile  : prod                                          ║
          ║  JVM Opts : -Xms256m -Xmx512m                            ║
          ║                                                           ║
          ║  ⚠  These credentials are unique to this build.           ║
          ║     To change them, edit docker-compose.prod.yml directly.║
          ╚═══════════════════════════════════════════════════════════╝
          EOF

      # ── 9. Bundle everything into a zip ──────────────────────────────────
      - name: Bundle deployment package
        run: |
          zip -r deployment-bundle.zip \
            docker-compose.prod.yml \
            monitoring/ \
            CREDENTIALS.txt \
            sbom-cyclonedx.json
          echo "Bundle size: $(du -sh deployment-bundle.zip | cut -f1)"

      # ── 10. Upload artifact ────────────────────────────────────────────────
      - name: Upload deployment bundle as artifact
        uses: actions/upload-artifact@v7
        with:
          name: deployment-bundle
          path: deployment-bundle.zip
          retention-days: 30

      # ── 11. GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sha-${{ needs.docker-build-scan-push.outputs.image-tag }}
          name: "Release sha-${{ needs.docker-build-scan-push.outputs.image-tag }}"
          body: |
            ## Docker Image
            `${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ needs.docker-build-scan-push.outputs.image-tag }}`
            **Digest:** `${{ needs.docker-build-scan-push.outputs.image-digest }}`

            ## 🚀 Deploy Instructions (no .env file needed!)
            1. Download and unzip `deployment-bundle.zip`
            2. Run: `docker compose -f docker-compose.prod.yml up -d`
            3. Check `CREDENTIALS.txt` for your unique login credentials

            ## Services
            - **App:** http://localhost:8080
            - **Prometheus:** http://localhost:9090
            - **Grafana:** http://localhost:3000

            > 🔑 Unique credentials were auto-generated for this release. See `CREDENTIALS.txt` in the bundle.
            > To change them, edit the values directly in `docker-compose.prod.yml`.
          files: |
            deployment-bundle.zip
            docker-compose.prod.yml
            sbom-cyclonedx.json
