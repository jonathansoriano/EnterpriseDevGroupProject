# Dharmin Patel
name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # NOTE: GitHub Container Registry requires lowercase image names
  IMAGE_NAME_LOWER: ${{ github.repository_owner }}/enterprisedevgroupproject

jobs:

  # ────────────────────────────────────────────────
  # Job 1: Build, Test & Coverage
  # ────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build & Test with JaCoCo Coverage
        run: ./mvnw verify

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # ────────────────────────────────────────────────
  # Job 2: Enforce Test Requirement for Merging
  # ────────────────────────────────────────────────
  test-gate:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Check if build-and-test passed
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "❌ Tests failed! Merge to main is blocked until tests pass."
            exit 1
          fi
          echo "✅ All tests passed! Merge is allowed."

  # ────────────────────────────────────────────────
  # Job 3: Build, Push Docker Image & Scan with Trivy
  # ────────────────────────────────────────────────
  docker-build-scan-push:
    runs-on: ubuntu-latest
    needs: [build-and-test, test-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.short-sha.outputs.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and Push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}@${{ steps.push.outputs.digest }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          scan-type: image
          scanners: vuln

  # ────────────────────────────────────────────────
  # Job 4: Publish – Compose file, Artifact & Release
  # ────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: docker-build-scan-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write   # required to create a GitHub Release

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Generate docker-compose.prod.yml
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ needs.docker-build-scan-push.outputs.image-tag }}"
          cat <<EOF > docker-compose.prod.yml
          version: "3.8"
          services:
            app:
              image: ${IMAGE}
              ports:
                - "8080:8080"
          EOF

      - name: Upload docker-compose file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-prod
          path: docker-compose.prod.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sha-${{ needs.docker-build-scan-push.outputs.image-tag }}
          name: "Release sha-${{ needs.docker-build-scan-push.outputs.image-tag }}"
          body: |
            Docker image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ needs.docker-build-scan-push.outputs.image-tag }}`
            Digest: `${{ needs.docker-build-scan-push.outputs.image-digest }}`
          files: docker-compose.prod.yml
